<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Help Wanted &lt;3 - Student Mutual Aid</title>
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Google Fonts for a friendly, modern design -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300..700&family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
  
  <style>
    body {
      font-family: 'Quicksand', sans-serif;
      background-color: #fdf8f5;
    }
    h1, h2, h3 {
      font-family: 'Fredoka', sans-serif;
    }
    .custom-scroll::-webkit-scrollbar {
      width: 6px;
    }
    .custom-scroll::-webkit-scrollbar-track {
      background: #f1f1f1;
      border-radius: 10px;
    }
    .custom-scroll::-webkit-scrollbar-thumb {
      background: #fbcfe8;
      border-radius: 10px;
    }
    .custom-scroll::-webkit-scrollbar-thumb:hover {
      background: #f472b6;
    }
  </style>
</head>
<body class="min-h-screen pb-12 text-slate-800">

  <!-- Header Banner -->
  <header class="bg-gradient-to-r from-pink-400 via-rose-400 to-indigo-400 text-white shadow-md">
    <div class="max-w-6xl mx-auto px-4 py-6 flex flex-col sm:flex-row justify-between items-center gap-4">
      <div class="text-center sm:text-left">
        <h1 class="text-3xl md:text-4xl font-bold flex items-center justify-center sm:justify-start gap-2">
          Help Wanted <span class="text-pink-200 animate-pulse">❤️</span>
        </h1>
        <p class="text-sm text-pink-50 font-medium mt-1">A cozy place for students to request and offer assistance!</p>
      </div>
      <div class="bg-white/20 backdrop-blur-md px-4 py-2 rounded-2xl border border-white/30 text-sm font-semibold">
        🤝 Connecting campus helpers &amp; seekers
      </div>
    </div>
  </header>

  <main class="max-w-6xl mx-auto px-4 mt-8 grid grid-cols-1 lg:grid-cols-12 gap-8">
    
    <!-- Left Column: Post a New Gig Form -->
    <section class="lg:col-span-5">
      <div class="bg-white rounded-3xl shadow-xl p-6 border border-pink-100/50 sticky top-6">
        <div class="flex items-center gap-3 mb-6">
          <div class="p-3 bg-pink-100 rounded-2xl text-pink-500">
            <!-- Clear, Recognizable Handshake Icon -->
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" class="h-6 w-6">
              <path d="m11 17 2 2a1 1 0 0 0 1.4 0l4-4a1 1 0 0 0 0-1.4l-1.6-1.6" />
              <path d="m14 14 2.5 2.5a1 1 0 0 0 1.4 0l2.5-2.5a1 1 0 0 0 0-1.4L18 10" />
              <path d="m10 11-4-4a1 1 0 0 0-1.4 0l-2.5 2.5a1 1 0 0 0 0 1.4l5 5a1 1 0 0 0 1.4 0l3-3" />
              <path d="m8.5 12.5 1.5 1.5" />
              <path d="m11.5 9.5 1.5 1.5" />
            </svg>
          </div>
          <div>
            <h2 class="text-xl font-bold text-slate-800">Need a Hand?</h2>
            <p class="text-xs text-slate-400">Post what you need and await helpful peers!</p>
          </div>
        </div>

        <form id="gigForm" class="space-y-4">
          <!-- Title -->
          <div>
            <label for="title" class="block text-xs font-bold uppercase tracking-wider text-slate-500 mb-1.5">What do you need help with? *</label>
            <input type="text" id="title" required placeholder="e.g., Carry cardboard boxes to trash chute" 
              class="w-full px-4 py-3 rounded-2xl bg-slate-50 border border-slate-200 focus:outline-none focus:ring-2 focus:ring-pink-400 focus:bg-white transition-all text-sm font-medium">
          </div>

          <!-- Category -->
          <div>
            <label for="category" class="block text-xs font-bold uppercase tracking-wider text-slate-500 mb-1.5">Category *</label>
            <select id="category" required 
              class="w-full px-4 py-3 rounded-2xl bg-slate-50 border border-slate-200 focus:outline-none focus:ring-2 focus:ring-pink-400 focus:bg-white transition-all text-sm font-medium text-slate-600">
              <option value="" disabled selected>Select a category</option>
              <option value="Academics &amp; Study">📚 Academics &amp; Study</option>
              <option value="Moving &amp; Heavy Lifting">📦 Moving &amp; Heavy Lifting</option>
              <option value="Food &amp; Deliveries">🍕 Food &amp; Deliveries</option>
              <option value="Tech Support">💻 Tech Support</option>
              <option value="Event Help">🎉 Event Help</option>
              <option value="Other">✨ Other</option>
            </select>
          </div>

          <!-- Urgency Input -->
          <div>
            <label for="urgency" class="block text-xs font-bold uppercase tracking-wider text-slate-500 mb-1.5">Urgency Level *</label>
            <select id="urgency" required 
              class="w-full px-4 py-3 rounded-2xl bg-slate-50 border border-slate-200 focus:outline-none focus:ring-2 focus:ring-pink-400 focus:bg-white transition-all text-sm font-medium text-slate-600">
              <option value="Medium" selected>⚠️ Medium Urgency</option>
              <option value="High">🚨 High Urgency</option>
              <option value="Low">🌱 Low Urgency</option>
            </select>
          </div>

          <!-- Time Input Field (Full width) -->
          <div>
            <label for="time" class="block text-xs font-bold uppercase tracking-wider text-slate-500 mb-1.5">When do you need it? *</label>
            <input type="datetime-local" id="time" required 
              class="w-full px-4 py-3 rounded-2xl bg-slate-50 border border-slate-200 focus:outline-none focus:ring-2 focus:ring-pink-400 focus:bg-white transition-all text-sm font-medium text-slate-600">
          </div>

          <!-- Location Input Field (Stacked below Time, Full width) -->
          <div>
            <label for="location" class="block text-xs font-bold uppercase tracking-wider text-slate-500 mb-1.5">Where is the gig? *</label>
            <input type="text" id="location" required placeholder="e.g., Dorm B Room 304" 
              class="w-full px-4 py-3 rounded-2xl bg-slate-50 border border-slate-200 focus:outline-none focus:ring-2 focus:ring-pink-400 focus:bg-white transition-all text-sm font-medium">
          </div>

          <!-- Submit Button -->
          <button type="submit" 
            class="w-full mt-2 bg-gradient-to-r from-pink-400 to-rose-400 hover:from-pink-500 hover:to-rose-500 text-white font-bold py-3.5 px-6 rounded-2xl shadow-lg shadow-rose-200 hover:shadow-xl hover:shadow-rose-300 transition-all transform active:scale-[0.98] flex items-center justify-center gap-2">
            <span>🚀 Publish Gig Request</span>
          </button>
        </form>
      </div>
    </section>

    <!-- Right Column: Filter and Interactive Gig List -->
    <section class="lg:col-span-7 flex flex-col gap-6">
      
      <!-- Stats / Filter Section -->
      <div class="bg-white rounded-3xl shadow-xl p-5 border border-pink-100/50 flex flex-col gap-4">
        
        <!-- Row 1: Status Filters & Counters -->
        <div class="flex flex-col md:flex-row justify-between items-center gap-4">
          <!-- Status Filter Tabs -->
          <div class="flex flex-wrap gap-2 p-1 bg-slate-100 rounded-2xl w-full md:w-auto">
            <button onclick="applyFilter('All')" id="filter-All" 
              class="filter-tab flex-1 md:flex-none px-4 py-2 rounded-xl text-xs font-bold transition-all text-slate-600 bg-white shadow-sm text-slate-800">
              All
            </button>
            <button onclick="applyFilter('Not finished')" id="filter-Not finished" 
              class="filter-tab flex-1 md:flex-none px-4 py-2 rounded-xl text-xs font-bold transition-all text-slate-500 hover:text-slate-800">
              Not Finished
            </button>
            <button onclick="applyFilter('Pending')" id="filter-Pending" 
              class="filter-tab flex-1 md:flex-none px-4 py-2 rounded-xl text-xs font-bold transition-all text-slate-500 hover:text-slate-800">
              Pending
            </button>
            <button onclick="applyFilter('Completed')" id="filter-Completed" 
              class="filter-tab flex-1 md:flex-none px-4 py-2 rounded-xl text-xs font-bold transition-all text-slate-500 hover:text-slate-800">
              Completed
            </button>
          </div>

          <!-- Mini Stats Counter -->
          <div class="flex gap-4 text-xs font-bold text-slate-500 w-full md:w-auto justify-around sm:justify-end">
            <div class="text-center md:text-right">
              <span class="text-rose-500 block text-lg font-extrabold leading-none" id="activeCount">0</span>
              <span>active</span>
            </div>
            <div class="h-8 w-[1px] bg-slate-200"></div>
            <div class="text-center md:text-right">
              <span class="text-indigo-500 block text-lg font-extrabold leading-none" id="pendingCount">0</span>
              <span>pending</span>
            </div>
            <div class="h-8 w-[1px] bg-slate-200"></div>
            <div class="text-center md:text-right">
              <span class="text-emerald-500 block text-lg font-extrabold leading-none" id="completedCount">0</span>
              <span>completed</span>
            </div>
          </div>
        </div>

        <!-- Row 2: Search Input & Category Filter -->
        <div class="grid grid-cols-1 md:grid-cols-12 gap-3 border-t border-slate-100 pt-3">
          <!-- Text Search input -->
          <div class="md:col-span-7 relative">
            <input type="text" id="searchInput" oninput="triggerSearchFilter()" placeholder="🔍 Search gigs by title, location..." 
              class="w-full px-4 py-2 text-xs font-semibold rounded-xl bg-slate-50 border border-slate-200 focus:outline-none focus:ring-2 focus:ring-pink-300 focus:bg-white transition-all text-slate-700">
          </div>
          <!-- Category Selector Dropdown -->
          <div class="md:col-span-5">
            <select id="categoryFilter" onchange="triggerCategoryFilter()" 
              class="w-full px-3 py-2 text-xs font-semibold rounded-xl bg-slate-50 border border-slate-200 focus:outline-none focus:ring-2 focus:ring-pink-300 focus:bg-white transition-all text-slate-600">
              <option value="All">📁 All Categories</option>
              <option value="Academics &amp; Study">📚 Academics &amp; Study</option>
              <option value="Moving &amp; Heavy Lifting">📦 Moving &amp; Heavy Lifting</option>
              <option value="Food &amp; Deliveries">🍕 Food &amp; Deliveries</option>
              <option value="Tech Support">💻 Tech Support</option>
              <option value="Event Help">🎉 Event Help</option>
              <option value="Other">✨ Other</option>
            </select>
          </div>
        </div>

      </div>

      <!-- Live Notification Banner (Self-hiding) -->
      <div id="toast" class="hidden fixed bottom-6 right-6 z-50 bg-slate-900 text-white px-6 py-3.5 rounded-2xl shadow-2xl flex items-center gap-3 transition-opacity duration-300 transform scale-95 opacity-0">
        <span class="text-pink-400">✨</span>
        <span id="toastMsg" class="text-sm font-semibold">Action completed successfully!</span>
      </div>

      <!-- Gig List Container -->
      <div id="gigList" class="space-y-4">
        <!-- Will be dynamically loaded -->
      </div>

    </section>
  </main>

  <script>
    // --- Google Sheets Configuration ---
    const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyjG54xRoOI26TUNmrjEafGm24qVWlsukksxN62fkPTjHSvOM78R3cAeX5Vy4x75oJ4xg/exec";

    // State Tracker
    let currentFilter = 'All';
    let currentCategoryFilter = 'All';
    let currentSearchQuery = '';

    // --- Backend API Sync Integration ---

    /**
     * Submit payloads (create / update) to Google Sheet Web App
     */
    async function syncToSheet(payload) {
      try {
        const response = await fetch(APPS_SCRIPT_URL, {
          method: "POST",
          headers: { "Content-Type": "text/plain" },
          body: JSON.stringify(payload)
        });
        const result = await response.json();
        if (!result.ok) {
          console.warn("Sheet sync error:", result.error);
        }
        return result;
      } catch (err) {
        console.error("Failed to sync directly to Google Sheets:", err);
      }
    }

    /**
     * Fetch raw records array from Google Sheets
     */
    async function fetchRecordsFromSheet() {
      const response = await fetch(APPS_SCRIPT_URL);
      if (!response.ok) throw new Error("Google Sheets Network response was not ok");
      const data = await response.json();
      if (!data.ok) throw new Error(data.error || "Unknown Apps Script Error");
      return (data.records || []).map(normalizeRecord);
    }

    /**
     * Normalize Sheet header values back into frontend camelCase keys
     */
    function normalizeRecord(record) {
      return {
        id: record["Task ID"] !== undefined ? record["Task ID"] : (record["id"] || ""),
        createdAt: record["Created At"] !== undefined ? record["Created At"] : (record["createdAt"] || ""),
        title: record["Help Requested"] !== undefined ? record["Help Requested"] : (record["title"] || ""),
        urgency: record["Urgency"] !== undefined ? record["Urgency"] : (record["urgency"] || "Medium"),
        category: record["Task Category"] !== undefined ? record["Task Category"] : (record["category"] || ""),
        time: record["Execution Time"] !== undefined ? record["Execution Time"] : (record["time"] || ""),
        location: record["Task Location"] !== undefined ? record["Task Location"] : (record["location"] || ""),
        status: record["Current Status"] !== undefined ? record["Current Status"] : (record["status"] || ""),
        comment: record["Execution Comment"] !== undefined ? record["Execution Comment"] : (record["comment"] || "")
      };
    }

    // --- Core JavaScript Implementation ---

    /**
     * Create a new record object based on form content.
     * @param {Object} formData 
     * @returns {Object} Representing the new Gig record
     */
    function createRecord(formData) {
      return {
        id: typeof crypto.randomUUID === 'function' ? crypto.randomUUID() : 'id_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9),
        createdAt: new Date().toISOString(),
        title: formData.title.trim(), // Stored cleanly: no appended meta bracket strings!
        urgency: formData.urgency || "Medium",
        category: formData.category,
        time: formData.time,
        location: formData.location.trim(),
        status: 'Not finished', // Default status
        comment: '' // Default blank comment
      };
    }

    /**
     * Add a record to the records array and write it to localStorage.
     * @param {Object} record 
     */
    function saveData(record) {
      const records = loadData();
      records.push(record);
      localStorage.setItem('records', JSON.stringify(records));
    }

    /**
     * Read the records array from localStorage.
     * @returns {Array} Always returns an array (empty if no data exists)
     */
    function loadData() {
      try {
        const stored = localStorage.getItem('records');
        const parsed = stored ? JSON.parse(stored) : [];
        return parsed.map(normalizeRecord);
      } catch (e) {
        console.error("Error reading localStorage", e);
        return [];
      }
    }

    /**
     * Update a single record and save back to localStorage.
     * @param {string} id 
     * @param {Object} changes 
     */
    function updateRecord(id, changes) {
      const records = loadData();
      const updatedRecords = records.map(record => {
        if (record.id === id) {
          return { ...record, ...changes };
        }
        return record;
      });
      localStorage.setItem('records', JSON.stringify(updatedRecords));
    }

    /**
     * Render the given records onto the page.
     * Displays a customized visual indicator based on Urgency parameters.
     * @param {Array} recordsToShow 
     */
    function renderList(recordsToShow) {
      const listContainer = document.getElementById('gigList');
      
      // Update counters based on entire data pool
      updateCounters();

      if (!recordsToShow || recordsToShow.length === 0) {
        listContainer.innerHTML = `
          <div class="bg-white rounded-3xl p-12 text-center border border-pink-100/30 shadow-md">
            <span class="text-5xl block mb-4">🎈</span>
            <h3 class="text-lg font-bold text-slate-700">No matching gigs found</h3>
            <p class="text-sm text-slate-400 mt-1 max-w-sm mx-auto">
              Try adjusting your text search, category filters, or task status selections.
            </p>
          </div>
        `;
        return;
      }

      listContainer.innerHTML = recordsToShow.map(gig => {
        const isCompleted = gig.status === 'Completed';
        const isPending = gig.status === 'Pending';
        const isNotFinished = gig.status === 'Not finished';

        // Formatted timestamp for display
        const dateObj = new Date(gig.time);
        const displayTime = dateObj.toLocaleString([], {
          month: 'short',
          day: 'numeric',
          hour: '2-digit',
          minute: '2-digit'
        });

        // Determine status pills & card styles
        let cardBgClass = 'bg-white border-pink-100/50 hover:border-pink-200';
        let statusBadge = '';

        if (isCompleted) {
          cardBgClass = 'bg-slate-50/80 border-slate-200 opacity-90 line-through-decor';
          statusBadge = `
            <span class="inline-flex items-center gap-1.5 px-3 py-1 rounded-full text-xs font-bold bg-emerald-100 text-emerald-700">
              <span class="w-1.5 h-1.5 rounded-full bg-emerald-500 animate-pulse"></span>
              Job Completed
            </span>
          `;
        } else if (isPending) {
          cardBgClass = 'bg-indigo-50/30 border-indigo-100 hover:border-indigo-200';
          statusBadge = `
            <span class="inline-flex items-center gap-1.5 px-3 py-1 rounded-full text-xs font-bold bg-indigo-100 text-indigo-700">
              <span class="w-1.5 h-1.5 rounded-full bg-indigo-500"></span>
              Pending
            </span>
          `;
        } else {
          statusBadge = `
            <span class="inline-flex items-center gap-1.5 px-3 py-1 rounded-full text-xs font-bold bg-rose-100 text-rose-700">
              <span class="w-1.5 h-1.5 rounded-full bg-rose-500"></span>
              Not finished
            </span>
          `;
        }

        // Urgency pill styling
        let urgencyBadge = '';
        if (gig.urgency === 'High') {
          urgencyBadge = `<span class="inline-flex items-center px-2 py-0.5 rounded-md text-[10px] font-bold bg-red-100 text-red-700 border border-red-200">🚨 High</span>`;
        } else if (gig.urgency === 'Low') {
          urgencyBadge = `<span class="inline-flex items-center px-2 py-0.5 rounded-md text-[10px] font-bold bg-emerald-100 text-emerald-700 border border-emerald-200">🌱 Low</span>`;
        } else {
          urgencyBadge = `<span class="inline-flex items-center px-2 py-0.5 rounded-md text-[10px] font-bold bg-amber-100 text-amber-700 border border-amber-200">⚠️ Medium</span>`;
        }

        return `
          <div class="relative bg-white rounded-3xl p-6 border shadow-md hover:shadow-lg transition-all duration-300 ${cardBgClass}">
            
            <!-- Main Details Row -->
            <div class="flex flex-col md:flex-row justify-between items-start gap-4 mb-4">
              <div class="flex-1">
                <!-- Status & Category Headers -->
                <div class="flex flex-wrap gap-2 items-center mb-2.5">
                  <span class="text-xs font-bold px-2.5 py-1 bg-slate-100 rounded-lg text-slate-600">
                    ${gig.category}
                  </span>
                  ${statusBadge}
                  ${urgencyBadge}
                </div>

                <!-- Gig Title -->
                <h3 class="text-lg font-bold text-slate-800 ${isCompleted ? 'text-slate-400 line-through' : ''}">
                  ${escapeHtml(gig.title)}
                </h3>

                <!-- Logistics Stacked (Time, and Location on a new line below) -->
                <div class="mt-3.5 space-y-2 text-xs text-slate-500 font-semibold">
                  <!-- Time Line -->
                  <div class="flex items-center gap-1.5">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" />
                    </svg>
                    <span class="${isOverdue(gig.time) && !isCompleted ? 'text-rose-500 font-bold' : ''}">
                      ${displayTime} ${isOverdue(gig.time) && !isCompleted ? '(Overdue!)' : ''}
                    </span>
                  </div>
                  <!-- Location Line -->
                  <div class="flex items-center gap-1.5 pt-0.5">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z" />
                      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z" />
                    </svg>
                    <span class="text-slate-600 font-medium">${escapeHtml(gig.location)}</span>
                  </div>
                </div>
              </div>

              <!-- Action State Controls -->
              <div class="flex flex-col sm:flex-row md:flex-col gap-2 w-full md:w-auto">
                <span class="text-[10px] uppercase font-bold tracking-wider text-slate-400 text-left md:text-right">Change Status:</span>
                <div class="inline-flex rounded-xl bg-slate-100 p-1 w-full sm:w-auto">
                  <button onclick="handleStatusToggle('${gig.id}', 'Not finished')" 
                    class="px-2.5 py-1 text-xs font-bold rounded-lg transition-all ${isNotFinished ? 'bg-rose-500 text-white shadow-sm' : 'text-slate-500 hover:text-slate-800'}">
                    Not Finished
                  </button>
                  <button onclick="handleStatusToggle('${gig.id}', 'Pending')" 
                    class="px-2.5 py-1 text-xs font-bold rounded-lg transition-all ${isPending ? 'bg-indigo-500 text-white shadow-sm' : 'text-slate-500 hover:text-slate-800'}">
                    Pending
                  </button>
                  <button onclick="handleStatusToggle('${gig.id}', 'Completed')" 
                    class="px-2.5 py-1 text-xs font-bold rounded-lg transition-all ${isCompleted ? 'bg-emerald-500 text-white shadow-sm' : 'text-slate-500 hover:text-slate-800'}">
                    Completed
                  </button>
                </div>
              </div>
            </div>

            <!-- Review / Comment Module -->
            <div class="mt-4 pt-4 border-t border-dashed border-slate-100">
              <div class="flex flex-col gap-2">
                <label class="text-xs font-bold text-slate-500 flex justify-between items-center">
                  <span>📝 Helper Note &amp; Feedback:</span>
                  ${gig.comment ? '<span class="text-[10px] text-emerald-500">✓ Feedback Saved</span>' : '<span class="text-[10px] text-slate-400">Optional feedback</span>'}
                </label>
                <div class="flex gap-2">
                  <input type="text" id="comment-input-${gig.id}" 
                    value="${escapeHtml(gig.comment || '')}" 
                    placeholder="Leave a comment on how this went..." 
                    class="flex-1 px-3 py-1.5 rounded-xl border border-slate-200 text-xs font-medium focus:outline-none focus:ring-1 focus:ring-pink-400">
                  <button onclick="saveFeedbackComment('${gig.id}')" 
                    class="px-3 py-1.5 bg-slate-800 text-white hover:bg-slate-700 text-xs font-bold rounded-xl transition-all">
                    Save Note
                  </button>
                </div>
              </div>
            </div>

            <!-- Delete Trigger button -->
            <button onclick="handleDelete('${gig.id}')" 
              class="absolute top-4 right-4 text-slate-300 hover:text-rose-500 transition-colors p-1"
              title="Delete this gig">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
              </svg>
            </button>

          </div>
        `;
      }).join('');
    }

    // --- Helper & Orchestration Logic ---

    /**
     * Reads state from Google Sheet, applies text filters, double filters, and sorts.
     * Graces dual-tier sorting: closest date first, then highest urgency first.
     */
    async function processAndRender(forceLocal = false) {
      let allRecords = [];
      
      if (!forceLocal) {
        try {
          // Attempt loading from Google Sheet
          allRecords = await fetchRecordsFromSheet();
          // Update offline local storage copy to sync
          localStorage.setItem('records', JSON.stringify(allRecords));
        } catch (e) {
          console.warn("Google Sheet sync failed. Loading fallback offline records.", e);
          allRecords = loadData();
          showToast('⚠️ Sheet offline. Loaded offline copy.');
        }
      } else {
        allRecords = loadData();
      }
      
      // --- Sorting: from closest date to farthest date AND THEN from Most urgent to least urgent ---
      const sortedRecords = allRecords.sort((a, b) => {
        const dateDiff = new Date(a.time) - new Date(b.time);
        if (dateDiff !== 0) {
          return dateDiff; // Closest date to farthest date
        }
        
        // Equal dates: Sort by Urgency (Most urgent to least urgent)
        const urgencyWeight = { 'High': 3, 'Medium': 2, 'Low': 1 };
        const weightA = urgencyWeight[a.urgency] || 2;
        const weightB = urgencyWeight[b.urgency] || 2;
        return weightB - weightA; // High -> Medium -> Low
      });

      // --- Multi-tier Filtering (Status, Category, Text Query) ---
      let filtered = sortedRecords;
      
      // 1. Status Filter
      if (currentFilter !== 'All') {
        filtered = filtered.filter(r => r.status === currentFilter);
      }

      // 2. Category Filter
      if (currentCategoryFilter !== 'All') {
        filtered = filtered.filter(r => r.category === currentCategoryFilter);
      }

      // 3. Search Bar Query
      if (currentSearchQuery.trim() !== '') {
        const query = currentSearchQuery.toLowerCase().trim();
        filtered = filtered.filter(r => 
          r.title.toLowerCase().includes(query) || 
          r.location.toLowerCase().includes(query) ||
          r.comment.toLowerCase().includes(query)
        );
      }

      renderList(filtered);
    }

    /**
     * Submits a text search query in real-time
     */
    function triggerSearchFilter() {
      currentSearchQuery = document.getElementById('searchInput').value;
      processAndRender(true); // Filter loaded data instantly for high performance
    }

    /**
     * Submits a category filter change
     */
    function triggerCategoryFilter() {
      currentCategoryFilter = document.getElementById('categoryFilter').value;
      processAndRender(true); // Filter loaded data instantly for high performance
    }

    /**
     * Submit event handler to submit new job gig requests
     */
    document.getElementById('gigForm').addEventListener('submit', async function (e) {
      e.preventDefault();

      const titleInput = document.getElementById('title');
      const categoryInput = document.getElementById('category');
      const urgencyInput = document.getElementById('urgency');
      const timeInput = document.getElementById('time');
      const locationInput = document.getElementById('location');

      const formData = {
        title: titleInput.value,
        category: categoryInput.value,
        urgency: urgencyInput.value,
        time: timeInput.value,
        location: locationInput.value
      };

      const record = createRecord(formData);
      
      // Save locally first to guarantee zero-loss if connection drops
      saveData(record);

      // UI Polish reset
      titleInput.value = '';
      categoryInput.selectedIndex = 0;
      urgencyInput.value = 'Medium';
      timeInput.value = '';
      locationInput.value = '';

      showToast('⏳ Syncing to Google Sheets...');
      // Sync live row creation to Google Sheet
      await syncToSheet({ action: "create", record });

      await processAndRender();
      showToast('🎉 Gig successfully posted!');
    });

    /**
     * Toggle event handles status transitions between 'Not finished', 'Pending', and 'Completed'
     */
    async function handleStatusToggle(id, newStatus) {
      // Local changes saved
      updateRecord(id, { status: newStatus });
      
      showToast('⏳ Syncing status...');
      // Sheet modifications saved
      await syncToSheet({ action: "update", id, changes: { status: newStatus } });
      
      await processAndRender();
      showToast(`Status updated to: ${newStatus}`);
    }

    /**
     * Save the comment submitted on a record
     */
    async function saveFeedbackComment(id) {
      const input = document.getElementById(`comment-input-${id}`);
      if (input) {
        const commentValue = input.value.trim();
        // Local update saved
        updateRecord(id, { comment: commentValue });
        
        showToast('⏳ Saving comment...');
        // Sync comment modification to Google Sheet
        await syncToSheet({ action: "update", id, changes: { comment: commentValue } });
        
        await processAndRender();
        showToast('📝 Helper note saved!');
      }
    }

    /**
     * Delete record entirely from local storage cache
     */
    function handleDelete(id) {
      const records = loadData();
      const filtered = records.filter(r => r.id !== id);
      localStorage.setItem('records', JSON.stringify(filtered));
      
      // Trigger rendering with fallback cache to prevent Sheet refetching it immediately
      processAndRender(true);
      showToast('🗑️ Gig request removed.');
    }

    /**
     * Applies selection class to filter tabs and runs the filter algorithm
     */
    function applyFilter(filterMode) {
      currentFilter = filterMode;
      
      // Update UI active styling
      document.querySelectorAll('.filter-tab').forEach(btn => {
        btn.classList.remove('bg-white', 'shadow-sm', 'text-slate-800');
        btn.classList.add('text-slate-500');
      });

      const activeBtn = document.getElementById(`filter-${filterMode}`);
      if (activeBtn) {
        activeBtn.classList.remove('text-slate-500');
        activeBtn.classList.add('bg-white', 'shadow-sm', 'text-slate-800');
      }

      processAndRender();
    }

    /**
     * Update statistic badges on screen dynamically based on current live state
     */
    function updateCounters() {
      const records = loadData();
      const activeCount = records.filter(r => r.status === 'Not finished').length;
      const pendingCount = records.filter(r => r.status === 'Pending').length;
      const completedCount = records.filter(r => r.status === 'Completed').length;

      document.getElementById('activeCount').innerText = activeCount;
      document.getElementById('pendingCount').innerText = pendingCount;
      document.getElementById('completedCount').innerText = completedCount;
    }

    /**
     * Helper checks if the item timeline has passed
     */
    function isOverdue(dateString) {
      return new Date(dateString) < new Date();
    }

    /**
     * Prevents basic XSS exploits within user inputs
     */
    function escapeHtml(text) {
      if (!text) return '';
      return text
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    /**
     * Custom notification block
     */
    let toastTimeout;
    function showToast(msg) {
      const toast = document.getElementById('toast');
      const toastMsg = document.getElementById('toastMsg');
      
      toastMsg.innerText = msg;
      
      toast.classList.remove('hidden');
      // Force trigger transition
      setTimeout(() => {
        toast.classList.remove('opacity-0', 'scale-95');
        toast.classList.add('opacity-100', 'scale-100');
      }, 10);

      clearTimeout(toastTimeout);
      toastTimeout = setTimeout(() => {
        toast.classList.remove('opacity-100', 'scale-100');
        toast.classList.add('opacity-0', 'scale-95');
        setTimeout(() => toast.classList.add('hidden'), 300);
      }, 2500);
    }

    // Initialize the system on load
    window.onload = function() {
      processAndRender();
    };
  </script>
</body>
